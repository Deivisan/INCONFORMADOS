<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inconformados - Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --surface-hover: #1F1F1F;
      --primary: #10B981;
      --secondary: #8B5CF6;
      --accent: #F59E0B;
      --warning: #EF4444;
      --text: #FAFAFA;
      --text-muted: #A1A1AA;
      --border: #27272A;
      --radius: 16px;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 var(--sans);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px 0;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: linear-gradient(180deg, #111 0%, #000 100%);
      border-radius: 56px;
      padding: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 116px;
      height: 30px;
      background: #000;
      border-radius: 999px;
      z-index: 10;
    }
    .screen {
      width: 100%;
      height: 100%;
      background: var(--bg);
      border-radius: 44px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 26px 6px;
      font: 600 14px/1 var(--sans);
      color: var(--text);
    }
    
    /* Header */
    .page-header {
      padding: 16px 22px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 18px;
      text-decoration: none;
      color: var(--text);
    }
    .header-title {
      font: 700 18px/1 var(--sans);
    }
    
    /* Chats List */
    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
    }
    .chat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: grid;
      place-items: center;
      font: 700 14px/1 var(--mono);
      color: #fff;
      flex-shrink: 0;
    }
    .chat-info { flex: 1; }
    .chat-name {
      font: 600 14px/1 var(--sans);
      margin: 0 0 2px;
    }
    .chat-last {
      font: 12px/1 var(--sans);
      color: var(--text-muted);
    }
    .chat-time {
      font: 10px/1 var(--mono);
      color: var(--text-muted);
    }
    .chat-badge {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font: 700 10px/1 var(--mono);
      display: grid;
      place-items: center;
    }
    
    /* Group Chats */
    .group-item .chat-avatar {
      background: var(--secondary);
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <span class="right">5G • 100%</span>
      </div>
      
      <div class="page-header">
        <a href="index.html" class="back-btn">&#8592;</a>
        <div class="header-title">Mensagens</div>
      </div>
      
      <div class="chats-list">
        <a href="#" class="chat-item">
          <div class="chat-avatar">M</div>
          <div class="chat-info">
            <p class="chat-name">Maria Silva</p>
            <p class="chat-last">Consegui completar o desafio!</p>
          </div>
          <span class="chat-time">14:32</span>
          <div class="chat-badge">2</div>
        </a>
        <a href="#" class="chat-item group-item">
          <div class="chat-avatar">J</div>
          <div class="chat-info">
            <p class="chat-name">Jardim Americas</p>
            <p class="chat-last">Pedro: Galera, alguem quer...</p>
          </div>
          <span class="chat-time">13:55</span>
          <div class="chat-badge">5</div>
        </a>
        <a href="#" class="chat-item">
          <div class="chat-avatar">P</div>
          <div class="chat-info">
            <p class="chat-name">Pastor Joao</p>
            <p class="chat-last">Como voces estaro se sentindo?</p>
          </div>
          <span class="chat-time">Ontem</span>
        </a>
        <a href="#" class="chat-item">
          <div class="chat-avatar">A</div>
          <div class="chat-info">
            <p class="chat-name">Ana Oliveira</p>
            <p class="chat-last">Obrigado pela oração!</p>
          </div>
          <span class="chat-time">2d</span>
        </a>
        <a href="#" class="chat-item group-item">
          <div class="chat-avatar">E</div>
          <div class="chat-info">
            <p class="chat-name">Equipe de Liderana</p>
            <p class="chat-last">Coordenador: Encontro dia 30...</p>
          </div>
          <span class="chat-time">3d</span>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
