<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inconformados - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #141414;
      --surface-hover: #1F1F1F;
      --primary: #10B981;
      --secondary: #8B5CF6;
      --accent: #F59E0B;
      --warning: #EF4444;
      --text: #FAFAFA;
      --text-muted: #A1A1AA;
      --border: #27272A;
      --radius: 16px;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 var(--sans);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px 0;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: linear-gradient(180deg, #111 0%, #000 100%);
      border-radius: 56px;
      padding: 12px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }
    .phone::before {
      content: '';
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 116px;
      height: 30px;
      background: #000;
      border-radius: 999px;
      z-index: 10;
    }
    .screen {
      width: 100%;
      height: 100%;
      background: var(--bg);
      border-radius: 44px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 26px 6px;
      font: 600 14px/1 var(--sans);
      color: var(--text);
    }
    
    .page-header {
      padding: 16px 22px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 18px;
      text-decoration: none;
      color: var(--text);
    }
    .header-title {
      font: 700 18px/1 var(--sans);
    }
    
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 16px 22px;
    }
    .admin-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .admin-stat .value {
      font: 700 28px/1 var(--sans);
      color: var(--primary);
    }
    .admin-stat .label {
      font: 11px/1 var(--mono);
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    .section-title {
      font: 700 13px/1 var(--mono);
      letter-spacing: 0.16em;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 0 22px 10px;
      margin-top: 16px;
    }
    
    .risk-list {
      padding: 0 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .risk-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .risk-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--warning);
      display: grid;
      place-items: center;
      font: 700 12px/1 var(--mono);
      color: #fff;
    }
    .risk-info { flex: 1; }
    .risk-name {
      font: 600 14px/1 var(--sans);
      margin: 0 0 2px;
    }
    .risk-status {
      font: 11px/1 var(--sans);
      color: var(--text-muted);
    }
    .risk-badge {
      font: 10px/1 var(--mono);
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(239,68,68,0.15);
      color: var(--warning);
    }
    
    .tabbar {
      margin-top: auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding: 12px 14px 32px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font: 9px/1 var(--mono);
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
    }
    .tab .icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      font-size: 18px;
    }
    .tab.active { color: var(--primary); }
    .tab.active .icon { background: var(--primary); color: #fff; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <span class="right">5G • 100%</span>
      </div>
      
      <div class="page-header">
        <a href="index.html" class="back-btn">&#8592;</a>
        <div class="header-title">Admin Dashboard</div>
      </div>
      
      <div class="admin-stats">
        <div class="admin-stat">
          <div class="value">127</div>
          <div class="label">Jovens Ativos</div>
        </div>
        <div class="admin-stat">
          <div class="value">84%</div>
          <div class="label">Engajamento</div>
        </div>
        <div class="admin-stat">
          <div class="value">3</div>
          <div class="label">Alertas</div>
        </div>
        <div class="admin-stat">
          <div class="value">12</div>
          <div class="label">Eventos</div>
        </div>
      </div>
      
      <p class="section-title">Alertas de Risco</p>
      <div class="risk-list">
        <div class="risk-item">
          <div class="risk-avatar">R</div>
          <div class="risk-info">
            <p class="risk-name">Rafael Silva</p>
            <p class="risk-status">15 dias sem atividade</p>
          </div>
          <span class="risk-badge">Risco Evasao</span>
        </div>
        <div class="risk-item">
          <div class="risk-avatar">C</div>
          <div class="risk-info">
            <p class="risk-name">Carlos Mendes</p>
            <p class="risk-status">Queda no engajamento</p>
          </div>
          <span class="risk-badge">Atenao</span>
        </div>
      </div>
      
      <div class="tabbar">
        <a href="index.html" class="tab"><div class="icon">H</div>Inicio</a>
        <a href="diario.html" class="tab"><div class="icon">D</div>Diario</a>
        <a href="missoes.html" class="tab"><div class="icon">M</div>Missao</a>
        <a href="feed.html" class="tab"><div class="icon">F</div>Feed</a>
        <a href="perfil.html" class="tab"><div class="icon">P</div>Perfil</a>
      </div>
    </div>
  </div>
</body>
</html>
